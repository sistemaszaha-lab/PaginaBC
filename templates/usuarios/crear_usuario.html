{% extends "base.html" %}

{% block title %}{% if modo_edicion %}Editar Usuario{% else %}Crear Usuario{% endif %}{% endblock %}

{% block content %}

<h2 class="mb-4">{% if modo_edicion %}Editar Usuario{% else %}Crear Usuario{% endif %}</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    {% if modo_edicion %}Actualizar{% else %}Guardar{% endif %}
                </button>

                <a href="{% url 'lista_usuarios' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
