{% extends "base.html" %}

{% block title %}{% if modo_edicion %}Editar Usuario{% else %}Crear Usuario{% endif %}{% endblock %}

{% block content %}

<h2 class="mb-4">{% if modo_edicion %}Editar Usuario{% else %}Crear Usuario{% endif %}</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="toggleUserPasswords">
                <label class="form-check-label" for="toggleUserPasswords">Mostrar contraseña</label>
            </div>

            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    {% if modo_edicion %}Actualizar{% else %}Guardar{% endif %}
                </button>

                <a href="{% url cancel_url %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

<script>
    const userPasswordFields = ["id_password1", "id_password2"]
        .map((id) => document.getElementById(id))
        .filter(Boolean);
    const toggleUserPasswords = document.getElementById("toggleUserPasswords");
    if (toggleUserPasswords && userPasswordFields.length) {
        toggleUserPasswords.addEventListener("change", function () {
            const type = this.checked ? "text" : "password";
            userPasswordFields.forEach((field) => {
                field.type = type;
            });
        });
    }
</script>

{% endblock %}
