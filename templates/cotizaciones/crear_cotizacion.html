{% extends "base.html" %}

{% block title %}Cotización{% endblock %}

{% block content %}
<h2 class="mb-4">Cotización</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit" class="btn btn-success">Guardar</button>
    <a href="{% url 'lista_cotizaciones' %}" class="btn btn-secondary">Volver</a>
</form>

<datalist id="clientes_datalist">
    {% for cliente in clientes %}
        <option value="{{ cliente }}"></option>
    {% endfor %}
    <option value="Registrar cliente nuevo"></option>
</datalist>

<script>
(() => {
    const input = document.getElementById("id_cliente");
    if (!input) return;
    const nuevoLabel = "Registrar cliente nuevo";
    const nuevoUrl = "{{ cliente_nuevo_url }}";
    const form = input.closest("form");

    const handleNuevo = () => {
        if (input.value === nuevoLabel) {
            window.location.href = nuevoUrl;
            return true;
        }
        return false;
    };

    input.addEventListener("change", handleNuevo);
    if (form) {
        form.addEventListener("submit", (event) => {
            if (handleNuevo()) {
                event.preventDefault();
            }
        });
    }
})();
</script>
<script>
(() => {
    const fechaSolicitud = document.getElementById("id_fecha_solicitud");
    const fechaEnvio = document.getElementById("id_fecha_envio");
    const tiempoEntrega = document.getElementById("id_tiempo_entrega");
    if (!fechaSolicitud || !fechaEnvio || !tiempoEntrega) return;

    const toUtcTime = (value) => {
        if (!value) return null;
        const parts = value.split("-").map(Number);
        if (parts.length !== 3) return null;
        return Date.UTC(parts[0], parts[1] - 1, parts[2]);
    };

    const recalcular = () => {
        const inicio = toUtcTime(fechaSolicitud.value);
        const fin = toUtcTime(fechaEnvio.value);
        if (inicio === null || fin === null) {
            tiempoEntrega.value = "";
            return;
        }
        const dias = Math.round((fin - inicio) / 86400000);
        tiempoEntrega.value = Number.isFinite(dias) ? `${dias} días` : "";
    };

    fechaSolicitud.addEventListener("change", recalcular);
    fechaEnvio.addEventListener("change", recalcular);
    recalcular();
})();
</script>
{% endblock %}
