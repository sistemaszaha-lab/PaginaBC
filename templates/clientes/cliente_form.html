{% extends "base.html" %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<h2 class="mb-4">{{ titulo }}</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% if next_url %}
                <input type="hidden" name="next" value="{{ next_url }}">
            {% endif %}
            {{ form.as_p }}
            <div class="mt-3">
                <button class="btn btn-success" type="submit">Guardar</button>
                <a class="btn btn-secondary" href="{% url 'cliente_lista' %}">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
