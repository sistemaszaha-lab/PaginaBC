<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card shadow-lg p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Iniciar Sesion</h3>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">User</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" id="toggleLoginPassword">
            <label class="form-check-label" for="toggleLoginPassword">Mostrar contraseña</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>

    {% if form.errors %}
        <div class="alert alert-danger mt-3">Usuario o contrasena incorrectos.</div>
    {% endif %}
</div>

<script>
    const loginPassword = document.getElementById("id_password");
    const toggleLoginPassword = document.getElementById("toggleLoginPassword");
    if (loginPassword && toggleLoginPassword) {
        toggleLoginPassword.addEventListener("change", function () {
            loginPassword.type = this.checked ? "text" : "password";
        });
    }
</script>

</body>
</html>
