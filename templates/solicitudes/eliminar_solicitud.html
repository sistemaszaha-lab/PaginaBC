<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Eliminar Solicitud</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h3>Seguro que quieres eliminar esta solicitud?</h3>

<p><strong>SG:</strong> {{ solicitud.sg }}</p>
<p><strong>Cliente:</strong> {{ solicitud.cliente }}</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Si, eliminar</button>
    <a href="{% url 'lista_solicitudes' %}" class="btn btn-secondary">Cancelar</a>
</form>

</body>
</html>
