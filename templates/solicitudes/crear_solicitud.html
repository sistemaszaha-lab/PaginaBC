{% extends "base.html" %}

{% block title %}Nueva Solicitud{% endblock %}

{% block content %}

<h2 class="mb-4">Nueva Solicitud</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="mt-3">
                <button type="submit" class="btn btn-success">
                    Guardar
                </button>

                <a href="{% url 'lista_solicitudes' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

<datalist id="clientes_datalist">
    {% for cliente in clientes %}
        <option value="{{ cliente }}"></option>
    {% endfor %}
    <option value="Registrar cliente nuevo"></option>
</datalist>

<script>
(() => {
    const input = document.getElementById("id_cliente");
    if (!input) return;
    const nuevoLabel = "Registrar cliente nuevo";
    const nuevoUrl = "{{ cliente_nuevo_url }}";
    const form = input.closest("form");

    const handleNuevo = () => {
        if (input.value === nuevoLabel) {
            window.location.href = nuevoUrl;
            return true;
        }
        return false;
    };

    input.addEventListener("change", handleNuevo);
    if (form) {
        form.addEventListener("submit", (event) => {
            if (handleNuevo()) {
                event.preventDefault();
            }
        });
    }
})();
</script>

{% endblock %}
