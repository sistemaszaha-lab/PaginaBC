{% extends "base.html" %}

{% block title %}Editar Solicitud{% endblock %}

{% block content %}

<h2 class="mb-4">Editar Solicitud</h2>

<div class="card shadow-sm">
    <div class="card-body">

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="mt-3">
                <button type="submit" class="btn btn-primary">
                    Guardar cambios
                </button>

                <a href="{% url 'lista_solicitudes' %}"
                   class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
        </form>

    </div>
</div>

{% endblock %}
